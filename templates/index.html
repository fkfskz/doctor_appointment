<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запись к врачу - Городская поликлиника</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .badge {
            background: #4caf50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #1e88e5;
            margin-bottom: 20px;
            border-bottom: 2px solid #1e88e5;
            padding-bottom: 10px;
        }

        .doctors-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .doctor-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #1e88e5;
        }

        .doctor-name {
            font-weight: bold;
            font-size: 1.1em;
        }

        .doctor-spec {
            color: #1e88e5;
            margin: 5px 0;
        }

        .doctor-schedule {
            color: #666;
            font-size: 0.9em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1e88e5 0%, #0d47a1 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            padding: 15px;
            border-radius: 8px;
        }

        .appointment-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #1e88e5;
        }

        .appointment-info {
            flex: 1;
        }

        .cancel-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        .cancel-btn:hover {
            background: #c82333;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr;
            }

            .appointment-card {
                flex-direction: column;
                text-align: center;
            }

            .cancel-btn {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Запись к врачу</h1>
            <p>Городская поликлиника №1</p>
            <div class="badge">✅ С ИНТЕГРИРОВАННЫМ МОДУЛЕМ</div>
        </div>

        <!-- Список врачей -->
        <div class="card">
            <h2>👨‍⚕️ Наши врачи</h2>
            <div class="doctors-list">
                {% for doctor in doctors %}
                <div class="doctor-card">
                    <div class="doctor-name">{{ doctor.name }}</div>
                    <div class="doctor-spec">{{ doctor.specialty }}</div>
                    <div class="doctor-schedule">⏰ {{ doctor.schedule }}</div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Форма записи -->
        <div class="card">
            <h2>📝 Запись на прием</h2>
            <form id="appointmentForm">
                <div class="row">
                    <div class="form-group">
                        <label>👨‍⚕️ Врач</label>
                        <select id="doctor" name="doctor_id" required>
                            <option value="">-- Выберите врача --</option>
                            {% for doctor in doctors %}
                            <option value="{{ doctor.id }}" data-name="{{ doctor.name }}">
                                {{ doctor.specialty }} - {{ doctor.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📅 Дата</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>🕐 Время</label>
                    <select id="time" name="time" required>
                        <option value="">-- Сначала выберите врача и дату --</option>
                    </select>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>👤 ФИО пациента</label>
                        <input type="text" id="patientName" name="patient_name" required>
                    </div>
                    <div class="form-group">
                        <label>📞 Телефон</label>
                        <input type="tel" id="patientPhone" name="patient_phone" required placeholder="+7XXXXXXXXXX">
                    </div>
                </div>

                <input type="hidden" id="doctorName" name="doctor_name">
                <button type="submit" class="btn">✅ Записаться</button>
            </form>

            <div id="formResult" class="hidden" style="margin-top: 15px;"></div>
        </div>

        <!-- Проверка записей -->
        <div class="card">
            <h2>🔍 Проверить мои записи</h2>
            <div class="row">
                <div class="form-group">
                    <label>📞 Номер телефона</label>
                    <input type="tel" id="checkPhone" placeholder="Введите номер телефона">
                </div>
                <div class="form-group" style="display: flex; align-items: flex-end;">
                    <button id="checkBtn" class="btn btn-secondary">Найти записи</button>
                </div>
            </div>
            <div id="appointmentsList"></div>
        </div>
    </div>

    <script>
        // DOM элементы
        const doctorSelect = document.getElementById('doctor');
        const dateInput = document.getElementById('date');
        const timeSelect = document.getElementById('time');
        const appointmentForm = document.getElementById('appointmentForm');
        const formResult = document.getElementById('formResult');
        const checkPhone = document.getElementById('checkPhone');
        const checkBtn = document.getElementById('checkBtn');
        const appointmentsList = document.getElementById('appointmentsList');

        // Устанавливаем минимальную дату (сегодня)
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;

        // Загрузка свободных слотов (использует интегрированный модуль)
        async function loadAvailableSlots() {
            const doctorId = doctorSelect.value;
            const date = dateInput.value;

            if (!doctorId || !date) {
                timeSelect.innerHTML = '<option value="">-- Выберите врача и дату --</option>';
                return;
            }

            // Вызов API, который использует интегрированный модуль
            const response = await fetch(`/available_slots?doctor_id=${doctorId}&date=${date}`);
            const data = await response.json();

            if (data.error) {
                timeSelect.innerHTML = `<option value="">${data.error}</option>`;
                return;
            }

            if (data.slots.length === 0) {
                timeSelect.innerHTML = '<option value="">-- Нет свободного времени --</option>';
            } else {
                timeSelect.innerHTML = '<option value="">-- Выберите время --</option>' +
                    data.slots.map(slot => `<option value="${slot}">${slot}</option>`).join('');
            }
        }

        // События для загрузки слотов
        doctorSelect.addEventListener('change', loadAvailableSlots);
        dateInput.addEventListener('change', loadAvailableSlots);

        // Установка имени врача
        doctorSelect.addEventListener('change', () => {
            const selected = doctorSelect.options[doctorSelect.selectedIndex];
            const doctorName = selected.getAttribute('data-name') || '';
            document.getElementById('doctorName').value = doctorName;
        });

        // Обработка формы записи (использует интегрированный модуль)
        appointmentForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(appointmentForm);

            // Вызов API, который использует интегрированный модуль
            const response = await fetch('/make_appointment', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                formResult.innerHTML = `
                    <div class="success">
                        ✅ ${result.ticket_number}<br>
                        Врач: ${result.appointment.doctor_name}<br>
                        📅 Дата: ${result.appointment.date}<br>
                        🕐 Время: ${result.appointment.time}<br>
                        👤 Пациент: ${result.appointment.patient_name}
                    </div>
                `;
                // Очистка формы
                appointmentForm.reset();
                timeSelect.innerHTML = '<option value="">-- Выберите врача и дату --</option>';
                doctorSelect.value = '';
            } else {
                formResult.innerHTML = `<div class="error">❌ ${result.error}</div>`;
            }

            formResult.classList.remove('hidden');

            setTimeout(() => {
                formResult.classList.add('hidden');
            }, 5000);
        });

        // Проверка записей по телефону (использует интегрированный модуль)
        checkBtn.addEventListener('click', async () => {
            const phone = checkPhone.value.trim();

            if (!phone) {
                appointmentsList.innerHTML = '<div class="error">Введите номер телефона</div>';
                return;
            }

            // Вызов API, который использует интегрированный модуль
            const response = await fetch(`/check_appointments?phone=${encodeURIComponent(phone)}`);
            const data = await response.json();

            if (data.error) {
                appointmentsList.innerHTML = `<div class="error">${data.error}</div>`;
                return;
            }

            if (data.appointments.length === 0) {
                appointmentsList.innerHTML = '<div class="info">📭 Записей не найдено</div>';
            } else {
                appointmentsList.innerHTML = data.appointments.map(apt => `
                    <div class="appointment-card">
                        <div class="appointment-info">
                            <strong>👨‍⚕️ ${apt.doctor_name}</strong><br>
                            📅 ${apt.date} | 🕐 ${apt.time}<br>
                            👤 ${apt.patient_name}<br>
                            🎫 ТАЛОН-${apt.id}
                        </div>
                        <button onclick="cancelAppointment(${apt.id}, '${phone}')" class="cancel-btn">
                            ❌ Отменить
                        </button>
                    </div>
                `).join('');
            }
        });

        // Отмена записи (использует интегрированный модуль)
        window.cancelAppointment = async (id, phone) => {
            if (!confirm('Вы уверены, что хотите отменить запись?')) return;

            const formData = new FormData();
            formData.append('appointment_id', id);

            // Вызов API, который использует интегрированный модуль
            const response = await fetch('/cancel_appointment', {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                alert('✅ Запись успешно отменена');
                // Обновляем список записей
                checkBtn.click();
            } else {
                alert('❌ Ошибка при отмене записи: ' + result.error);
            }
        };
    </script>
</body>
</html>
